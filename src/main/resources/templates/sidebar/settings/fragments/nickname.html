<div th:fragment="nicknameForm">

  <div class="card shadow-sm">
    <div class="card-body">

      <h4 class="mb-3">닉네임 변경</h4>

      <form th:action="@{/settings/nickname}" method="post">

        <div class="mb-3">
          <label class="form-label">현재 닉네임</label>
          <input type="text"
                 class="form-control"
                 th:value="${session.userName}"
                 disabled>
        </div>

        <div class="mb-3">
          <label class="form-label">새 닉네임</label>
          <input type="text"
                 name="newNickname"
                 class="form-control"
                 required>
        </div>

        <div th:if="${error}" class="text-danger mb-2">
          <span th:text="${error}"></span>
        </div>

        <div th:if="${success}" class="text-success mb-2">
          닉네임이 변경되었습니다.
        </div>

        <button type="submit"
                class="btn btn-success">
          변경하기
        </button>

      </form>

    </div>
  </div>

</div>
