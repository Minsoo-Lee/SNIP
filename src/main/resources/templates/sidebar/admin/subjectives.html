<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section})">
<section>

  <h2 class="mb-4">관리자 페이지</h2>

  <div th:replace="~{sidebar/admin/fragments/adminNav :: adminNav}"></div>

  <div class="row">
    <div class="col-6 border-end">
      <div th:replace="~{sidebar/admin/fragments/subjectives/subjectiveList :: subjectiveList}"></div>
    </div>
    <div class="col-6">

<!--      &lt;!&ndash; ⭐ 노션 sync 영역 항상 위에 &ndash;&gt;-->
<!--      <div th:replace="~{sidebar/admin/fragments/subjectives/subjectiveSync :: subjectiveSync}"></div>-->

      <!-- 생성 -->
      <th:block th:if="${mode == 'create'}">
        <div th:replace="~{sidebar/admin/fragments/subjectives/subjectiveCreate :: subjectiveCreate}"></div>
      </th:block>

      <!-- 수정 -->
      <th:block th:if="${mode == 'edit'}">
        <div th:replace="~{sidebar/admin/fragments/subjectives/subjectiveEdit :: subjectiveEdit}"></div>
      </th:block>

      <!-- 삭제 -->
      <th:block th:if="${mode == 'delete'}">
        <div th:replace="~{sidebar/admin/fragments/subjectives/subjectiveDelete :: subjectiveDelete}"></div>
      </th:block>
    </div>
  </div>

</section>
</html>
