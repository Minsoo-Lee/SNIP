<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="categoryList">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">카테고리 목록</h5>
  </div>

  <!-- 필터 버튼 -->
  <div class="btn-group mb-3" role="group">
    <a class="btn btn-sm"
       th:classappend="${cond.filter == 'active'} ? ' btn-dark' : ' btn-outline-dark'"
       th:href="@{/admin/categories(filter='active')}">
      사용 중
    </a>

    <a class="btn btn-sm"
       th:classappend="${cond.filter == 'deleted'} ? ' btn-dark' : ' btn-outline-dark'"
       th:href="@{/admin/categories(filter='deleted')}">
      삭제됨
    </a>

    <a class="btn btn-sm"
       th:classappend="${cond.filter == 'all'} ? ' btn-dark' : ' btn-outline-dark'"
       th:href="@{/admin/categories(filter='all')}">
      전체 보기
    </a>
  </div>

  <!-- 검색 -->
  <form th:action="@{/admin/categories}" method="get" class="row g-2 mb-3">

    <!-- 현재 필터 유지 -->
    <input type="hidden" name="filter" th:value="${cond.filter}">

    <div class="col">
      <input type="text"
             name="keyword"
             class="form-control form-control-sm"
             placeholder="검색어 입력"
             th:value="${cond.keyword}">
    </div>

    <div class="col-auto">
      <button type="submit" class="btn btn-sm btn-primary">
        검색
      </button>
    </div>

    <!-- 🔥 여기다 넣는 거 -->
    <div class="col-auto"
         th:if="${cond.keyword != null and cond.keyword != ''}">
      <a th:href="@{/admin/categories(filter=${cond.filter})}"
         class="btn btn-sm btn-outline-secondary">
        초기화
      </a>
    </div>

  </form>

  <table class="table table-hover align-middle">
    <thead>
    <tr>
      <th>ID</th>
      <th>카테고리</th>

      <th th:if="${cond.filter == 'active' or cond.filter == 'all'}">
        상태
      </th>

      <th th:if="${cond.filter == 'active' or cond.filter == 'all'}">
        수정일
      </th>

      <th th:if="${cond.filter == 'deleted' or cond.filter == 'all'}">
        삭제일
      </th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${categories}"
        style="cursor:pointer;"
        th:classappend="${selectedId == c.id} ? 'table-primary'"
        th:onclick="|location.href='@{/admin/categories/{id}(id=${c.id}, filter=${filter})}'|">

      <td th:text="${c.id}"></td>

      <td th:text="${c.name}"></td>

      <!-- 상태 -->
      <td th:if="${cond.filter == 'active' or cond.filter == 'all'}">

        <span class="badge bg-success"
              th:if="${c.deletedAt == null}">
          사용 중
        </span>

        <span class="badge bg-dark"
              th:if="${c.deletedAt != null}">
          삭제됨
        </span>

      </td>

      <!-- 수정일 -->
      <td th:if="${cond.filter == 'active' or cond.filter == 'all'}">
        <span th:text="${c.deletedAt == null
            ? #temporals.format(c.updatedAt, 'yyyy-MM-dd HH:mm')
            : '-'}"></span>
      </td>

      <!-- 삭제일 -->
      <td th:if="${cond.filter == 'deleted' or cond.filter == 'all'}">
        <span th:text="${c.deletedAt != null
            ? #temporals.format(c.deletedAt, 'yyyy-MM-dd HH:mm')
            : '-'}"></span>
      </td>

    </tr>
    </tbody>
  </table>

  <nav th:if="${page.totalPages > 1}">
    <ul class="pagination justify-content-center">

      <!-- << 첫 페이지 -->
      <li class="page-item"
          th:classappend="${page.first} ? ' disabled'">

        <a class="page-link"
           th:href="@{/admin/categories(
            page=0,
            filter=${cond.filter},
            keyword=${cond.keyword}
         )}">
          &laquo;
        </a>
      </li>

      <!-- 이전 블록 -->
      <li class="page-item"
          th:classappend="${startPage == 0} ? ' disabled'">

        <a class="page-link"
           th:href="@{/admin/categories(
            page=${startPage - 1},
            filter=${cond.filter},
            keyword=${cond.keyword}
         )}">
          이전
        </a>
      </li>

      <!-- 페이지 번호 -->
      <li class="page-item"
          th:each="i : ${#numbers.sequence(startPage, endPage)}"
          th:classappend="${i == page.number} ? ' active'">

        <a class="page-link"
           th:text="${i + 1}"
           th:href="@{/admin/categories(
            page=${i},
            filter=${cond.filter},
            keyword=${cond.keyword}
         )}">
        </a>
      </li>

      <!-- 다음 블록 -->
      <li class="page-item"
          th:classappend="${endPage >= page.totalPages - 1} ? ' disabled'">

        <a class="page-link"
           th:href="@{/admin/categories(
            page=${endPage + 1},
            filter=${cond.filter},
            keyword=${cond.keyword}
         )}">
          다음
        </a>
      </li>

      <!-- >> 마지막 페이지 -->
      <li class="page-item"
          th:classappend="${page.last} ? ' disabled'">

        <a class="page-link"
           th:href="@{/admin/categories(
            page=${page.totalPages - 1},
            filter=${cond.filter},
            keyword=${cond.keyword}
         )}">
          &raquo;
        </a>
      </li>

    </ul>
  </nav>

</div>
</html>
