<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="categoryList">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">카테고리 목록</h5>
<!--    <a class="btn btn-sm btn-primary" th:href="@{/admin/categories}">-->
<!--      + 추가-->
<!--    </a>-->
  </div>

  <table class="table table-hover align-middle">
    <thead>
    <tr>
      <th>ID</th>
      <th>카테고리</th>
      <th>수정일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${categories}"
        style="cursor:pointer;"
        th:classappend="${selectedId == c.id} ? 'table-primary'"
        th:onclick="|location.href='@{/admin/categories/{id}(id=${c.id})}'|">

      <td th:text="${c.id}"></td>
      <td th:text="${c.name}"></td>
      <td th:text="${#temporals.format(c.updatedAt, 'yyyy-MM-dd')}"></td>
    </tr>
    </tbody>
  </table>

</div>
</html>
