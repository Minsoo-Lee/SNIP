<div th:fragment="categoryEdit">

  <!-- 성공 메시지 -->
  <div th:if="${successMessage != null}"
       class="alert alert-success d-flex align-items-center justify-content-between shadow-sm border-0 rounded-3 px-4 py-3 mb-4"
       role="alert">

    <div class="d-flex align-items-center">
      <span class="me-3 fs-3">✅</span>

      <div>
        <div class="fw-bold">저장 완료</div>
        <div th:text="${successMessage}" class="small"></div>
      </div>
    </div>

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert"></button>
  </div>

  <!-- 수정 -->
  <div class="card p-4 mb-4 shadow-sm border-0">

    <h5 class="mb-3">카테고리 수정</h5>

    <form th:action="@{/admin/categories/{id}(id=${category.id})}"
          th:object="${category}"
          method="post">

      <div class="mb-3">
        <label class="form-label">카테고리명</label>

        <input th:field="*{name}"
               class="form-control"
               th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"/>

        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('name')}"
             th:errors="*{name}">
        </div>
      </div>

      <button class="btn btn-success">
        저장
      </button>

    </form>
  </div>

  <!-- 위험 작업 -->
  <div class="card border-danger shadow-sm">

    <div class="card-body">

      <h5 class="text-danger mb-2">
        위험 작업
      </h5>

      <p class="text-muted small mb-3">
        삭제된 카테고리는 복구할 수 없습니다.
      </p>

      <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}"
            method="post"
            onsubmit="return confirm('정말 삭제하시겠습니까?');">

        <button class="btn btn-danger">
          카테고리 삭제
        </button>

      </form>

    </div>
  </div>

</div>
