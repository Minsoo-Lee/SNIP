<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="memberDelete">

  <div class="card border-danger shadow-sm">

    <div class="card-body">

      <h4 class="text-danger mb-3">
        유저 삭제
      </h4>

      <p class="mb-3">
        해당 유저를 삭제하시겠습니까?
      </p>

      <div class="alert alert-secondary">
        <strong th:text="${memberForm.nickname}"></strong>
      </div>

      <form th:action="@{/admin/members/{id}/delete(id=${memberForm.id})}"
            method="post">

        <button class="btn btn-danger">
          삭제하기
        </button>

        <a th:href="@{/admin/members/{id}/edit(id=${memberForm.id})}"
           class="btn btn-secondary">
          취소
        </a>

      </form>

    </div>
  </div>

</div>
