<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="memberEdit">

  <!-- 성공 메시지 -->
  <div th:if="${successMessage != null}"
       class="alert alert-success d-flex align-items-center justify-content-between shadow-sm border-0 rounded-3 px-4 py-3 mb-4"
       role="alert">

    <div class="d-flex align-items-center">
      <span class="me-3 fs-3">✅</span>

      <div>
        <div class="fw-bold">저장 완료</div>
        <div th:text="${successMessage}" class="small"></div>
      </div>
    </div>

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert">
    </button>
  </div>

  <h5 class="mb-4">유저 수정</h5>

  <!-- 수정 카드 -->
  <div class="card shadow-sm border-0 mb-4">

    <div class="card-body">

      <h6 class="mb-3 border-bottom pb-2">
        기본 정보 수정
      </h6>

      <form th:action="@{/admin/members/{id}(id=${memberForm.id})}"
            th:object="${memberForm}"
            method="post">

        <div class="mb-3">
          <label class="form-label">닉네임</label>

          <input type="text"
                 th:field="*{nickname}"
                 class="form-control"
                 required/>
        </div>

        <div class="mb-3">
          <label class="form-label">새 비밀번호</label>

          <input type="password"
                 th:field="*{password}"
                 class="form-control"
                 th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"/>
        </div>

        <div class="mb-3">
          <label class="form-label">비밀번호 확인</label>

          <input type="password"
                 th:field="*{confirmPassword}"
                 class="form-control"
                 th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"/>

          <div class="invalid-feedback"
               th:if="${#fields.hasErrors('confirmPassword')}"
               th:errors="*{confirmPassword}">
          </div>
        </div>

        <button type="submit" class="btn btn-success">
          저장
        </button>

      </form>

    </div>
  </div>

  <!-- 계정 정보 -->
  <div class="card shadow-sm border-0 mb-4 bg-light">

    <div class="card-body">

      <h6 class="mb-3 border-bottom pb-2">
        계정 정보
      </h6>

      <div class="row mb-2">
        <div class="col-4 text-muted">회원번호</div>
        <div class="col-8 fw-semibold"
             th:text="${memberForm.id}">
        </div>
      </div>

      <div class="row mb-2">
        <div class="col-4 text-muted">이메일</div>
        <div class="col-8 fw-semibold"
             th:text="${memberForm.email}">
        </div>
      </div>

      <div class="row mb-2">
        <div class="col-4 text-muted">가입일</div>
        <div class="col-8"
             th:text="${#temporals.format(memberForm.createdAt, 'yyyy-MM-dd HH:mm')}">
        </div>
      </div>

      <div class="row mb-2">
        <div class="col-4 text-muted">마지막 로그인</div>
        <div class="col-8"
             th:text="${#temporals.format(memberForm.lastLoginDate, 'yyyy-MM-dd HH:mm')}">
        </div>
      </div>

    </div>
  </div>

  <!-- 위험 작업 -->
  <div class="card border-danger shadow-sm">

    <div class="card-body">
      <h5 class="text-danger mb-2">
        위험 작업
      </h5>
      <p class="text-muted small mb-3">
        삭제된 유저는 복구할 수 없습니다.
      </p>
      <a th:href="@{/admin/members/{id}/delete(id=${memberForm.id})}"
         class="btn btn-danger">
        유저 삭제
      </a>

    </div>
  </div>
