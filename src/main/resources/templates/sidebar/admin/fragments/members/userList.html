<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="userList">

  <div class="d-flex justify-content-between mb-2">
    <h5>유저 목록</h5>
    <a class="btn btn-sm btn-primary" th:href="@{/admin/members}">+ 추가</a>
  </div>

  <table class="table table-hover">
    <thead>
    <tr>
      <th>닉네임</th>
      <th>이메일</th>
      <th>상태</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="member : ${members}"
        style="cursor:pointer;"
        th:classappend="${selectedId == member.id} ? 'table-primary'"
        th:onclick="|location.href='@{/admin/members/{id}(id=${member.id})}'|">
      <td th:text="${member.nickname}"></td>
      <td th:text="${member.email}"></td>
      <td>
          <span class="badge bg-success"
                th:if="${member.lastLoginDate.isAfter(T(java.time.LocalDateTime).now().minusDays(7))}">
            최근 접속
          </span>
        <span class="badge bg-danger"
              th:if="${member.lastLoginDate.isBefore(T(java.time.LocalDateTime).now().minusDays(30))}">
            비활성
          </span>
        <span class="badge bg-secondary"
              th:if="${member.lastLoginDate.isAfter(T(java.time.LocalDateTime).now().minusDays(30))
                       and member.lastLoginDate.isBefore(T(java.time.LocalDateTime).now().minusDays(7))}">
            휴면
          </span>
      </td>
    </tr>
    </tbody>
  </table>

</div>

</html>
