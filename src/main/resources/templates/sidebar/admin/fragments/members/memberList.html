<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="memberList">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">유저 목록</h5>
<!--    <a class="btn btn-sm btn-primary" th:href="@{/admin/members(filter=${filter})}">+ 추가</a>-->
  </div>

  <!-- 필터 버튼 -->
  <div class="btn-group mb-3" role="group">
    <a class="btn btn-sm"
       th:classappend="${cond.filter == 'active'} ? ' btn-dark' : ' btn-outline-dark'"
       th:href="@{/admin/members(filter='active')}">
      활성 회원
    </a>
    <a class="btn btn-sm"
       th:classappend="${cond.filter == 'deleted'} ? ' btn-dark' : ' btn-outline-dark'"
       th:href="@{/admin/members(filter='deleted')}">
      삭제 회원
    </a>
    <a class="btn btn-sm"
       th:classappend="${cond.filter == 'all'} ? ' btn-dark' : ' btn-outline-dark'"
       th:href="@{/admin/members(filter='all')}">
      전체 보기
    </a>
  </div>

  <!-- 검색 -->
  <form th:action="@{/admin/members}" method="get" class="row g-2 mb-3">

    <!-- 현재 필터 유지 -->
    <input type="hidden" name="filter" th:value="${cond.filter}">

    <div class="col-auto">
      <select name="searchType" class="form-select form-select-sm">
        <option value="nickname"
                th:selected="${cond.searchType == 'nickname'}">
          닉네임
        </option>
        <option value="email"
                th:selected="${cond.searchType == 'email'}">
          이메일
        </option>
      </select>
    </div>

    <div class="col">
      <input type="text"
             name="keyword"
             class="form-control form-control-sm"
             placeholder="검색어 입력"
             th:value="${cond.keyword}">
    </div>

    <div class="col-auto">
      <button type="submit" class="btn btn-sm btn-primary">
        검색
      </button>
    </div>

  </form>

  <table class="table table-hover align-middle">
    <thead>
    <tr>
      <th>닉네임</th>
      <th>이메일</th>
      <th th:if="${cond.filter == 'active' or cond.filter == 'all'}">상태</th>
      <th th:if="${cond.filter == 'deleted' or cond.filter == 'all'}">삭제일</th>
      <th th:if="${cond.filter == 'active' or cond.filter == 'all'}">수정일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="member : ${members}"
        style="cursor:pointer;"
        th:classappend="${selectedId == member.id} ? 'table-primary'"
        th:onclick="|location.href='@{/admin/members/{id}(id=${member.id}, filter=${filter})}'|">

      <td th:text="${member.nickname}"></td>
      <td th:text="${member.email}"></td>

      <td th:if="${filter == 'active' or filter == 'all'}">
        <!-- 삭제된 회원 우선 표시 -->
        <span class="badge bg-dark" th:if="${member.deletedAt != null}">
          삭제됨
        </span>

        <!-- 활성 회원 상태 -->
        <span class="badge bg-success"
              th:if="${member.deletedAt == null and member.lastLoginDate != null and member.lastLoginDate.isAfter(T(java.time.LocalDateTime).now().minusDays(7))}">
          최근 접속
        </span>

        <span class="badge bg-danger"
              th:if="${member.deletedAt == null and member.lastLoginDate != null and member.lastLoginDate.isBefore(T(java.time.LocalDateTime).now().minusDays(30))}">
          비활성
        </span>

        <span class="badge bg-secondary"
              th:if="${member.deletedAt == null and member.lastLoginDate != null
                 and member.lastLoginDate.isAfter(T(java.time.LocalDateTime).now().minusDays(30))
                 and member.lastLoginDate.isBefore(T(java.time.LocalDateTime).now().minusDays(7))}">
          휴면
        </span>

        <span class="badge bg-warning text-dark"
              th:if="${member.deletedAt == null and member.lastLoginDate == null}">
          접속 기록 없음
        </span>
      </td>

      <td th:if="${cond.filter == 'deleted' or cond.filter == 'all'}">
        <span th:text="${member.deletedAt != null ? #temporals.format(member.deletedAt, 'yyyy-MM-dd HH:mm') : '-'}"></span>
      </td>

      <td th:if="${cond.filter == 'active' or cond.filter == 'all'}">
        <span th:text="${member.updatedAt != null ? #temporals.format(member.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}"></span>
      </td>
    </tr>
    </tbody>
  </table>

</div>

</html>
