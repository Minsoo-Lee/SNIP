<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="subjectiveEdit">

  <!-- 성공 메시지 -->
  <div th:if="${successMessage != null}"
       class="alert alert-success d-flex align-items-center justify-content-between shadow-sm border-0 rounded-3 px-4 py-3 mb-4"
       role="alert">

    <div class="d-flex align-items-center">
      <span class="me-3 fs-3">✅</span>

      <div>
        <div class="fw-bold">저장 완료</div>
        <div th:text="${successMessage}" class="small"></div>
      </div>
    </div>

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert"></button>
  </div>

  <div class="card p-4 mb-4 shadow-sm border-0">

    <h5 class="mb-3">문제 수정</h5>

    <form th:action="@{/admin/subjectives/{id}(id=${subjective.id})}"
          th:object="${subjective}"
          method="post">

      <div class="mb-3">
        <label class="form-label">카테고리명</label>

        <select name="selectedCategory" class="form-select" required>
          <option th:value="*{categoryName}"
                  th:text="*{categoryName}"
                  selected>
          </option>

          <!-- 나머지 카테고리 -->
          <option th:each="category : ${categories}"
                  th:if="${category.name != subjective.categoryName}"
                  th:value="${category.name}"
                  th:text="${category.name}">
          </option>
        </select>
<!--        <input th:field="*{categoryName}" class="form-control">-->
      </div>

      <div class="mb-3">

        <label class="form-label">내용</label>

        <input th:field="*{content}"
               class="form-control"
               th:classappend="${#fields.hasErrors('content')} ? ' is-invalid'"/>

        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('content')}"
             th:errors="*{content}">
        </div>
      </div>

      <button class="btn btn-success">
        저장
      </button>

    </form>
  </div>

  <!-- 위험 작업 -->
  <div class="card border-danger shadow-sm">

    <div class="card-body">
      <h5 class="text-danger mb-2">
        위험 작업
      </h5>
      <p class="text-muted small mb-3">
        삭제된 카테고리는 복구할 수 없습니다.
      </p>
      <a th:href="@{/admin/subjectives/{id}/delete(id=${subjective.id})}"
         class="btn btn-danger">
        카테고리 삭제
      </a>

    </div>
  </div>

</div>
</html>
