<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="subjectiveSync">

  <div class="card p-3 mb-3 bg-light">

    <div class="d-flex justify-content-between align-items-center">
      <div>
        <strong>Notion 동기화</strong><br>
        <small class="text-muted">
          마지막 동기화:
          <span th:text="${lastSyncAt != null ? #temporals.format(lastSyncAt, 'yyyy-MM-dd HH:mm') : '없음'}"></span>
        </small>
      </div>

      <form th:action="@{/admin/subjectives/sync}" method="post">
        <button class="btn btn-sm btn-primary">
          노션에서 불러오기
        </button>
      </form>
    </div>

    <!-- ⭐ Preview 영역 -->
    <div th:if="${preview != null}" class="mt-3">

      <hr>

      <h6>변경 미리보기</h6>

      <div>
        <strong>추가</strong>
        <ul>
          <li th:each="s : ${preview.added}" th:text="${s.title}"></li>
        </ul>
      </div>

      <div>
        <strong>수정</strong>
        <ul>
          <li th:each="s : ${preview.updated}" th:text="${s.title}"></li>
        </ul>
      </div>

      <div>
        <strong>삭제</strong>
        <ul>
          <li th:each="s : ${preview.deleted}" th:text="${s.title}"></li>
        </ul>
      </div>

      <form th:action="@{/admin/subjectives/apply}" method="post">
        <button class="btn btn-success btn-sm mt-2">
          변경 적용
        </button>
      </form>

    </div>

  </div>

</div>
</html>
