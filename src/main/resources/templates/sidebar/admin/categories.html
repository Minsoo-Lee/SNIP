<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section})">
<section>

  <h2 class="mb-4">관리자 페이지</h2>

  <div th:replace="~{sidebar/admin/fragments/adminNav :: adminNav}"></div>

  <div class="row">
    <!-- 왼쪽: 리스트 -->
    <div class="col-6 border-end">
      <div th:replace="~{sidebar/admin/fragments/categories/categoryList :: categoryList}"></div>
    </div>

    <!-- 오른쪽 -->
    <div class="col-6">

      <!-- 생성 -->
      <th:block th:if="${mode == 'create'}">
        <div th:replace="~{sidebar/admin/fragments/categories/categoryCreate :: categoryCreate}"></div>
      </th:block>

      <!-- 수정 -->
      <th:block th:if="${mode == 'edit'}">
        <div th:replace="~{sidebar/admin/fragments/categories/categoryEdit :: categoryEdit}"></div>
      </th:block>

      <!-- 삭제 -->
      <th:block th:if="${mode == 'delete'}">
        <div th:replace="~{sidebar/admin/fragments/categories/categoryDelete :: categoryDelete}"></div>
      </th:block>

    </div>
  </div>

</section>
</html>
