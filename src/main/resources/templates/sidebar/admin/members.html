<div th:fragment="usersForm">

  <div class="row">

    <!-- 🔹 좌측: 유저 리스트 -->
    <div class="col-6 border-end">

      <div class="d-flex justify-content-between mb-2">
        <h5>유저 목록</h5>
        <a class="btn btn-sm btn-primary"
           th:href="@{/admin/manage(tab='members')}">
          + 추가
        </a>
      </div>

      <table class="table table-hover">
        <thead>
        <tr>
          <th>닉네임</th>
          <th>이메일</th>
          <th>상태</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="member : ${members}"
            style="cursor:pointer;"
            th:classappend="${selectedMember.id == member.id} ? 'table-primary'"
            th:onclick="|location.href='@{/admin/manage(tab='members', memberId=${member.id})}'|">

          <td th:text="${member.nickname}"></td>
          <td th:text="${member.email}"></td>

          <!-- 🔥 상태 표시 -->
          <td>
            <!-- 최근 접속 -->
            <span class="badge bg-success"
                  th:if="${member.lastLoginDate.isAfter(T(java.time.LocalDateTime).now().minusDays(7))}">
              최근 접속
            </span>

            <!-- 비활성 -->
            <span class="badge bg-danger"
                  th:if="${member.lastLoginDate.isBefore(T(java.time.LocalDateTime).now().minusDays(30))}">
              비활성
            </span>

            <!-- 애매한 구간 -->
            <span class="badge bg-secondary"
                  th:if="${member.lastLoginDate.isAfter(T(java.time.LocalDateTime).now().minusDays(30))
                         and member.lastLoginDate.isBefore(T(java.time.LocalDateTime).now().minusDays(7))}">
              휴면
            </span>
          </td>

        </tr>
        </tbody>
      </table>

    </div>

    <!-- 🔹 우측 -->
    <div class="col-6">

      <h5 th:text="${selectedMember.id != null ? '유저 수정' : '유저 추가'}"></h5>

      <!-- 🔥 상단: 수정 영역 -->
      <div class="card p-3 mb-3">

        <h6 class="mb-3">수정 정보</h6>

        <form id="saveForm"
              th:action="@{/admin/members/save}"
              method="post">

          <input type="hidden" name="id" th:value="${selectedMember.id}"/>

          <div class="mb-2">
            <label>닉네임</label>
            <input type="text" name="nickname" class="form-control"
                   th:value="${selectedMember.nickname}" required/>
          </div>

          <div class="mb-2" th:if="${selectedMember.id == null}">
            <label>비밀번호</label>
            <input type="password" name="password" class="form-control" required/>
          </div>

          <!-- 비밀번호 변경 -->
          <div class="mb-2" th:if="${selectedMember.id != null}">
            <label>새 비밀번호</label>
            <input type="password" name="newPassword" class="form-control"/>
          </div>

          <div class="mb-2" th:if="${selectedMember.id != null}">
            <label>비밀번호 확인</label>
            <input type="password" name="confirmPassword" class="form-control"/>
          </div>

        </form>

        <!-- 버튼 -->
        <div class="d-flex justify-content-between mt-3">
          <button type="submit" form="saveForm" class="btn btn-success">
            저장
          </button>

          <button type="button" class="btn btn-danger"
                  th:if="${selectedMember.id != null}"
                  data-bs-toggle="modal"
                  data-bs-target="#deleteModal">
            삭제
          </button>
        </div>

      </div>

      <!-- 🔥 하단: 메타 정보 -->
      <div class="card p-3 bg-light" th:if="${selectedMember.id != null}">

        <h6 class="mb-3 border-bottom pb-2">계정 정보</h6>

        <div class="row mb-2">
          <div class="col-4 text-muted">회원번호</div>
          <div class="col-8 fw-semibold"
               th:text="${selectedMember.id}"></div>
        </div>

        <div class="row mb-2">
          <div class="col-4 text-muted">이메일 (로그인 ID)</div>
          <div class="col-8 fw-semibold"
               th:text="${selectedMember.email}"></div>
        </div>

        <div class="row mb-2">
          <div class="col-4 text-muted">가입일</div>
          <div class="col-8"
               th:text="${#temporals.format(selectedMember.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
        </div>

        <div class="row mb-2">
          <div class="col-4 text-muted">마지막 로그인</div>
          <div class="col-8"
               th:text="${#temporals.format(selectedMember.lastLoginDate, 'yyyy-MM-dd HH:mm')}"></div>
        </div>

      </div>

    </div>

  </div>

  <!-- 🔥 삭제 모달 -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">삭제 확인</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <strong th:text="${selectedMember.nickname}"></strong>
          유저를 정말 삭제하시겠습니까?
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>

          <form th:action="@{/admin/members/delete}" method="post">
            <input type="hidden" name="id" th:value="${selectedMember.id}"/>
            <button type="submit" class="btn btn-danger">삭제</button>
          </form>
        </div>

      </div>
    </div>
  </div>

</div>
