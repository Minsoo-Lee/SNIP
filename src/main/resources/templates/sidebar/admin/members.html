<div th:fragment="usersForm">

  <div class="row">

    <!-- 🔹 좌측: 유저 리스트 (ID 제거) -->
    <div class="col-6 border-end">

      <div class="d-flex justify-content-between mb-2">
        <h5>유저 목록</h5>
        <a class="btn btn-sm btn-primary"
           th:href="@{/admin/manage(tab='members')}">
          + 추가
        </a>
      </div>

      <table class="table table-hover">
        <thead>
        <tr>
          <th>닉네임</th>
          <th>이메일</th>
          <th>마지막 로그인</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="member : ${members}"
            style="cursor:pointer;"
            th:onclick="|location.href='@{/admin/manage(tab='members', memberId=${member.id})}'|">

          <td th:text="${member.nickname}"></td>
          <td th:text="${member.email}"></td>

          <td th:text="${#temporals.format(member.lastLoginDate, 'yyyy-MM-dd HH:mm')}"
              th:classappend="${member.lastLoginDate.isBefore(T(java.time.LocalDateTime).now().minusDays(7))} ? 'text-danger'">
          </td>

        </tr>
        </tbody>
      </table>

    </div>

    <!-- 🔹 우측: 상세 -->
    <div class="col-6">

      <h5 th:text="${selectedMember.id != null ? '유저 수정' : '유저 추가'}"></h5>

      <form th:action="@{/admin/members/save}" method="post">

        <!-- ID는 여기서만 노출 -->
        <div class="mb-2" th:if="${selectedMember.id != null}">
          <label>ID</label>
          <input type="text" class="form-control"
                 th:value="${selectedMember.id}" readonly/>
        </div>

        <input type="hidden" name="id" th:value="${selectedMember.id}"/>

        <div class="mb-2">
          <label>닉네임</label>
          <input type="text" name="nickname" class="form-control"
                 th:value="${selectedMember.nickname}" required/>
        </div>

        <div class="mb-2">
          <label>이메일</label>
          <input type="email" name="email" class="form-control"
                 th:value="${selectedMember.email}" required/>
        </div>

        <div class="mb-2" th:if="${selectedMember.id == null}">
          <label>비밀번호</label>
          <input type="password" name="password" class="form-control" required/>
        </div>

        <!-- 읽기 전용 정보 -->
        <div class="mb-2" th:if="${selectedMember.id != null}">
          <label>가입일</label>
          <input type="text" class="form-control"
                 th:value="${#temporals.format(selectedMember.createdAt, 'yyyy-MM-dd HH:mm')}"
                 readonly/>
        </div>

        <div class="mb-2" th:if="${selectedMember.id != null}">
          <label>마지막 로그인</label>
          <input type="text" class="form-control"
                 th:value="${#temporals.format(selectedMember.lastLoginDate, 'yyyy-MM-dd HH:mm')}"
                 readonly/>
        </div>

        <button type="submit" class="btn btn-success">저장</button>

      </form>

      <form th:if="${selectedMember.id != null}"
            th:action="@{/admin/members/delete}" method="post" class="mt-2">
        <input type="hidden" name="id" th:value="${selectedMember.id}"/>
        <button type="submit" class="btn btn-danger">삭제</button>
      </form>

    </div>

  </div>

</div>
