<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section})">

<section>
  <div class="row g-4">

    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-body">

          <!-- 📊 월별 완료 추이 카드 -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">

              <!-- 카드 제목 -->
              <h4 class="fw-semibold mb-2">월별 완료 추이</h4>

              <!-- 그래프 영역 -->
              <div class="bg-light rounded p-3">
                <div style="height: 260px;">
                  <canvas id="monthlyChart"></canvas>
                </div>
              </div>

            </div>
          </div>

          <!-- 📌 이번 달 활동 요약 -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">

              <!-- 카드 제목 -->
              <h5 class="fw-semibold mb-4">이번 달 활동 요약</h5>

              <div class="row g-4 text-center">

                <!-- 이번 달 완료 -->
                <div class="col-md-4">
                  <div class="p-4 bg-light rounded text-center h-100">
                    <div class="text-muted small mb-2">이번 달 완료</div>
                    <div class="fs-3 fw-bold"
                         th:text="${MonthlyCount} + '개'">
                      12개
                    </div>
                  </div>
                </div>

                <div class="col-md-4">
                  <div class="p-4 bg-light rounded text-center h-100">
                    <div class="text-muted small mb-2">지난 달 대비</div>
                    <div class="fs-3 fw-bold"
                         th:text="${monthDiffRate}">
                      +15%
                    </div>
                  </div>
                </div>

                <div class="col-md-4">
                  <div class="p-4 bg-light rounded text-center h-100">
                    <div class="text-muted small mb-2">최근 30일 평균 작성 길이</div>
                    <div class="fs-3 fw-bold"
                         th:text="${recentAvgLength}">
                      924자
                    </div>
                  </div>
                </div>

              </div>

            </div>
          </div>

          <!-- 📍 현재 진행 상태 -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">

              <h5 class="fw-semibold mb-4">현재 진행 상태</h5>

              <div class="text-center mb-3">
                <div class="display-6 fw-bold"
                     th:text="${progressRate} + '%'">
                  42%
                </div>
                <div class="small text-muted">
                  전체 기록 대비 완료 비율
                </div>
              </div>

              <div class="progress" style="height: 14px;">
                <div class="progress-bar"
                     role="progressbar"
                     th:style="'width:' + ${progressRate} + '%'">
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
  <script th:inline="javascript">
      /* Controller에서 넘겨준 데이터 */
      const months = [[${months}]];
      const monthlyCounts = [[${monthlyCounts}]];

      const ctx = document.getElementById('monthlyChart').getContext('2d');

      new Chart(ctx, {
          type: 'line',
          data: {
              labels: months,
              datasets: [{
                  label: '월별 완료 수',
                  data: monthlyCounts,
                  tension: 0.3,
                  borderWidth: 2,
                  fill: false,
                  pointRadius: 4
              }]
          },
          options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                  y: {
                      beginAtZero: true,
                      ticks: {
                          stepSize: 1
                      }
                  }
              },
              plugins: {
                  legend: {
                      display: true
                  }
              }
          }
      });
  </script>
</section>

</html>
